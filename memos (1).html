<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mémos">
<meta name="theme-color" content="#1a1a2e">
<title>Mémos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --bg2: #eeeae2;
  --bg3: #e4dfd5;
  --surface: #ffffff;
  --ink: #1a1a1e;
  --ink2: #5a5856;
  --ink3: #9a9693;
  --accent: #2d6a4f;
  --accent-light: #d8f3dc;
  --accent-mid: #52b788;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --hl-yellow: #fff176;
  --hl-yellow-text: #5a4a00;
  --hl-pink: #fce4ec;
  --hl-pink-text: #6a1030;
  --hl-blue: #e3f2fd;
  --hl-blue-text: #0d2c52;
  --hl-green: #e8f5e9;
  --hl-green-text: #1b4d2e;
  --hl-orange: #fff3e0;
  --hl-orange-text: #5c2d00;
  --r: 12px;
  --r-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141414;
    --bg2: #1c1c1e;
    --bg3: #242426;
    --surface: #1e1e20;
    --ink: #f0ece4;
    --ink2: #a09c96;
    --ink3: #6a6662;
    --accent: #52b788;
    --accent-light: #1b3a2a;
    --accent-mid: #74c69d;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --hl-yellow: #4a3c00;
    --hl-yellow-text: #ffe57f;
    --hl-pink: #3d0e1e;
    --hl-pink-text: #f48fb1;
    --hl-blue: #0a1f35;
    --hl-blue-text: #90caf9;
    --hl-green: #0d2518;
    --hl-green-text: #a5d6a7;
    --hl-orange: #2e1600;
    --hl-orange-text: #ffcc80;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--ink); }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; background: none; border: none; outline: none; }

/* ── SCREENS ── */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1), opacity 0.28s; }
.screen.hidden { pointer-events: none; }
.screen.slide-right { transform: translateX(100%); opacity: 0; }
.screen.slide-left { transform: translateX(-30%); opacity: 0; }

/* ── TOPBAR ── */
.topbar {
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex; align-items: center; gap: 10px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: calc(var(--safe-top) + 52px);
}
.topbar-title { font-size: 17px; font-weight: 500; flex: 1; letter-spacing: -0.01em; }
.topbar-title.large { font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; letter-spacing: -0.02em; }
.btn-back { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent-mid); background: var(--accent-light); flex-shrink: 0; }
.btn-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--ink2); }
.btn-text { font-size: 15px; color: var(--accent-mid); font-weight: 500; padding: 6px 2px; }
.btn-text.danger { color: #e05a5a; }

/* ── SCROLL BODY ── */
.scroll-body { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 80px); }

/* ── FAB ── */
.fab {
  position: absolute;
  bottom: calc(var(--safe-bottom) + 20px);
  right: 20px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 26px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  transition: transform 0.15s, box-shadow 0.15s;
  z-index: 10;
}
.fab:active { transform: scale(0.94); box-shadow: 0 1px 6px rgba(0,0,0,0.12); }

/* ── FOLDERS ── */
.section-label { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; padding: 18px 18px 6px; }
.folder-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  position: relative;
}
.folder-item:first-child { border-top: 1px solid var(--border); }
.folder-item:active { background: var(--bg2); }
.folder-emoji { font-size: 22px; width: 38px; height: 38px; background: var(--bg2); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.folder-info { flex: 1; }
.folder-name { font-size: 15px; font-weight: 500; }
.folder-count { font-size: 12px; color: var(--ink3); margin-top: 1px; }
.folder-chevron { color: var(--ink3); font-size: 16px; }
.folder-actions { display: none; gap: 8px; }
.folder-item.editing .folder-actions { display: flex; }
.folder-item.editing .folder-chevron { display: none; }

/* ── NOTE LIST ── */
.note-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
}
.note-item:first-child { border-top: 1px solid var(--border); margin-top: 8px; }
.note-item:active { background: var(--bg2); }
.note-color-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
.note-info { flex: 1; min-width: 0; }
.note-item-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item-preview { font-size: 13px; color: var(--ink2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-item-date { font-size: 11px; color: var(--ink3); margin-top: 4px; }
.empty-state { text-align: center; padding: 60px 30px; color: var(--ink3); }
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* ── EDITOR ── */
#screen-editor .scroll-body { padding-bottom: 0; }
.editor-wrap { padding: 16px 18px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bottom) + 16px); }
#editor-title {
  font-family: 'DM Serif Display', serif;
  font-size: 26px; font-weight: 400; line-height: 1.3;
  color: var(--ink); width: 100%;
  border-bottom: 1px solid var(--border);
  padding-bottom: 10px; margin-bottom: 14px;
  letter-spacing: -0.02em;
}
#editor-title:empty:before { content: attr(data-placeholder); color: var(--ink3); }

/* TOOLBAR */
.toolbar-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
.toolbar { display: flex; gap: 4px; padding: 8px 12px; white-space: nowrap; width: max-content; }
.t-btn {
  padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 400;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--ink2); transition: background 0.12s, color 0.12s;
  cursor: pointer; white-space: nowrap;
}
.t-btn:active { background: var(--bg3); }
.t-btn.hl-yellow { background: var(--hl-yellow); color: var(--hl-yellow-text); border-color: transparent; }
.t-btn.hl-pink { background: var(--hl-pink); color: var(--hl-pink-text); border-color: transparent; }
.t-btn.hl-blue { background: var(--hl-blue); color: var(--hl-blue-text); border-color: transparent; }
.t-btn.hl-green { background: var(--hl-green); color: var(--hl-green-text); border-color: transparent; }
.t-btn.hl-orange { background: var(--hl-orange); color: var(--hl-orange-text); border-color: transparent; }
.t-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
.t-sep { width: 1px; background: var(--border2); margin: 4px 2px; flex-shrink: 0; }

/* NOTE CONTENT AREA */
#editor-body { flex: 1; min-height: 160px; outline: none; font-size: 16px; line-height: 1.75; color: var(--ink); caret-color: var(--accent); word-break: break-word; }
#editor-body:empty:before { content: attr(data-placeholder); color: var(--ink3); pointer-events: none; }

/* Checklist items */
#editor-body .check-line { display: flex; align-items: flex-start; gap: 10px; padding: 2px 0; }
#editor-body .check-line input[type=checkbox] {
  width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0;
  accent-color: var(--accent); cursor: pointer;
}
#editor-body .check-line .check-text { flex: 1; outline: none; min-width: 0; word-break: break-word; }
#editor-body .check-line.done .check-text { text-decoration: line-through; color: var(--ink3); }

/* Highlights */
.hl-y { background: var(--hl-yellow); color: var(--hl-yellow-text); border-radius: 3px; padding: 0 2px; }
.hl-p { background: var(--hl-pink); color: var(--hl-pink-text); border-radius: 3px; padding: 0 2px; }
.hl-b { background: var(--hl-blue); color: var(--hl-blue-text); border-radius: 3px; padding: 0 2px; }
.hl-g { background: var(--hl-green); color: var(--hl-green-text); border-radius: 3px; padding: 0 2px; }
.hl-o { background: var(--hl-orange); color: var(--hl-orange-text); border-radius: 3px; padding: 0 2px; }

/* Color note dot */
.color-strip { height: 3px; border-radius: 3px 3px 0 0; }

/* ── MODAL ── */
.modal-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end;
  transition: opacity 0.22s;
}
.modal-overlay.hidden { opacity: 0; pointer-events: none; }
.modal-sheet {
  background: var(--surface); border-radius: 18px 18px 0 0;
  padding: 20px 20px calc(var(--safe-bottom) + 24px);
  width: 100%;
  transform: translateY(0); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.hidden .modal-sheet { transform: translateY(100%); }
.modal-title { font-size: 17px; font-weight: 500; margin-bottom: 16px; }
.modal-label { font-size: 12px; color: var(--ink3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-input { width: 100%; padding: 11px 14px; border-radius: var(--r-sm); border: 1px solid var(--border2); background: var(--bg2); font-size: 16px; margin-bottom: 14px; }
.modal-input:focus { border-color: var(--accent-mid); }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 18px; }
.emoji-opt { font-size: 22px; text-align: center; padding: 8px; border-radius: var(--r-sm); cursor: pointer; border: 2px solid transparent; transition: border-color 0.12s, background 0.12s; }
.emoji-opt.selected { border-color: var(--accent); background: var(--accent-light); }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; padding: 13px; border-radius: var(--r); font-size: 15px; font-weight: 500; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg2); color: var(--ink2); }

/* ── NOTE COLORS ── */
.nc-picker { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.nc-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.12s, transform 0.12s; }
.nc-opt.selected { border-color: var(--ink); transform: scale(1.15); }

/* ── MOVE NOTE modal ── */
.move-folder-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.move-folder-opt { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--r-sm); border: 1px solid var(--border2); cursor: pointer; transition: background 0.12s; }
.move-folder-opt:active, .move-folder-opt.selected { background: var(--accent-light); border-color: var(--accent-mid); }
.move-folder-opt span:first-child { font-size: 20px; }

/* ── SEARCH ── */
.search-bar { margin: 12px 16px; position: relative; }
.search-bar input { width: 100%; padding: 10px 14px 10px 38px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); font-size: 15px; }
.search-bar::before { content: '🔍'; font-size: 14px; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }

/* ── SWIPE DELETE ── */
.swipe-wrap { position: relative; overflow: hidden; }
.swipe-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: #e05a5a; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; pointer-events: none; }
</style>
</head>
<body>

<!-- ═══ SCREEN: FOLDERS ═══ -->
<div class="screen" id="screen-folders">
  <div class="topbar">
    <span class="topbar-title large">Mémos</span>
    <button class="btn-icon" id="btn-search-toggle" title="Rechercher">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="btn-icon" id="btn-new-folder" title="Nouveau dossier">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
    </button>
  </div>
  <div class="scroll-body" id="folders-scroll">
    <div id="search-bar-wrap" style="display:none;">
      <div class="search-bar"><input type="search" id="search-input" placeholder="Rechercher dans toutes les notes…" autocomplete="off"></div>
    </div>
    <div id="search-results" style="display:none;">
      <div class="section-label">Résultats</div>
      <div id="search-list"></div>
    </div>
    <div id="folders-main">
      <div class="section-label">Dossiers</div>
      <div id="folder-list"></div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN: NOTES LIST ═══ -->
<div class="screen hidden slide-right" id="screen-notes">
  <div class="topbar">
    <button class="btn-back" id="btn-back-folders">‹</button>
    <span class="topbar-title" id="notes-topbar-title">Notes</span>
    <button class="btn-icon" id="btn-edit-folder">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>
  </div>
  <div class="scroll-body">
    <div id="note-list"></div>
  </div>
  <button class="fab" id="btn-new-note">+</button>
</div>

<!-- ═══ SCREEN: EDITOR ═══ -->
<div class="screen hidden slide-right" id="screen-editor">
  <div class="topbar">
    <button class="btn-back" id="btn-back-notes">‹</button>
    <span class="topbar-title" id="editor-topbar-folder"></span>
    <button class="btn-text" id="btn-note-color">●</button>
    <button class="btn-text" id="btn-export-note">Export</button>
    <button class="btn-text" id="btn-move-note">Déplacer</button>
    <button class="btn-text danger" id="btn-delete-note">Suppr.</button>
  </div>
  <div class="toolbar-scroll">
    <div class="toolbar">
      <button class="t-btn" id="tbtn-check">☑ Tâche</button>
      <span class="t-sep"></span>
      <button class="t-btn hl-yellow" id="tbtn-yl">S jaune</button>
      <button class="t-btn hl-pink" id="tbtn-pk">S rose</button>
      <button class="t-btn hl-blue" id="tbtn-bl">S bleu</button>
      <button class="t-btn hl-green" id="tbtn-gn">S vert</button>
      <button class="t-btn hl-orange" id="tbtn-or">S orange</button>
      <span class="t-sep"></span>
      <button class="t-btn" id="tbtn-bold"><b>Gras</b></button>
      <button class="t-btn" id="tbtn-italic"><i>Italique</i></button>
    </div>
  </div>
  <div class="editor-wrap">
    <div id="editor-title" contenteditable="true" data-placeholder="Titre…" spellcheck="true"></div>
    <div id="editor-body" contenteditable="true" data-placeholder="Commence à écrire…" spellcheck="true"></div>
  </div>
</div>

<!-- ═══ MODAL: NEW/EDIT FOLDER ═══ -->
<div class="modal-overlay hidden" id="modal-folder">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-folder-title">Nouveau dossier</div>
    <div class="modal-label">Nom</div>
    <input class="modal-input" id="modal-folder-name" type="text" placeholder="Ex: Travail, Courses…" maxlength="40">
    <div class="modal-label">Icône</div>
    <div class="emoji-grid" id="emoji-grid"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-folder-cancel">Annuler</button>
      <button class="btn-primary" id="modal-folder-save">Créer</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: NOTE COLOR ═══ -->
<div class="modal-overlay hidden" id="modal-note-color">
  <div class="modal-sheet">
    <div class="modal-title">Couleur de la note</div>
    <div class="nc-picker" id="nc-picker"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-nc-cancel">Fermer</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: MOVE NOTE ═══ -->
<div class="modal-overlay hidden" id="modal-move">
  <div class="modal-sheet">
    <div class="modal-title">Déplacer vers…</div>
    <div class="move-folder-list" id="move-folder-list"></div>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-move-cancel">Annuler</button>
    </div>
  </div>
</div>

<!-- ═══ MODAL: CONFIRM DELETE ═══ -->
<div class="modal-overlay hidden" id="modal-confirm-delete">
  <div class="modal-sheet">
    <div class="modal-title">Supprimer cette note ?</div>
    <p style="font-size:14px;color:var(--ink2);margin-bottom:20px;">Cette action est irréversible.</p>
    <div class="modal-btns">
      <button class="btn-secondary" id="modal-del-cancel">Annuler</button>
      <button class="btn-primary" style="background:#e05a5a;" id="modal-del-confirm">Supprimer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const STORE_KEY = 'memos_v1';
const EMOJIS = ['📁','🛒','💼','✨','🏠','📚','🎯','🌱','🎵','🍕','✈️','💪','💡','📝','🎨','🧘','🐾','🌿','⭐','🔥','💬','🗓','🔑','💰','🏋️'];
const NOTE_COLORS = ['#ffffff00','#52b788','#74c69d','#f4a261','#e76f51','#e9c46a','#457b9d','#9b5de5','#f15bb5','#adb5bd'];

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { folders: [], notes: [] }; } catch { return { folders: [], notes: [] }; }
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(ts) {
  const d = new Date(ts), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yesterday = new Date(today - 86400000);
  const dd = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (+dd === +today) return d.toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' });
  if (+dd === +yesterday) return 'Hier';
  return d.toLocaleDateString('fr', { day: 'numeric', month: 'short' });
}

let db = loadData();
let currentFolderId = null;
let currentNoteId = null;
let saveTimer = null;
let editingFolderId = null;
let selectedEmoji = '📁';

// Ensure default folder
if (!db.folders.length) {
  db.folders.push({ id: uid(), name: 'Mes notes', emoji: '📝', createdAt: Date.now() });
  saveData(db);
}

// ════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════
function showScreen(id, direction = 'forward') {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('slide-right', 'slide-left');
    if (s.id !== id) {
      s.classList.add('hidden', direction === 'forward' ? 'slide-left' : 'slide-right');
    } else {
      s.classList.remove('hidden', 'slide-left', 'slide-right');
    }
  });
}

// ════════════════════════════════════════════
//  FOLDERS
// ════════════════════════════════════════════
function renderFolders() {
  const list = document.getElementById('folder-list');
  list.innerHTML = '';
  db.folders.forEach(f => {
    const count = db.notes.filter(n => n.folderId === f.id).length;
    const div = document.createElement('div');
    div.className = 'folder-item';
    div.dataset.id = f.id;
    div.innerHTML = `
      <div class="folder-emoji">${f.emoji}</div>
      <div class="folder-info">
        <div class="folder-name">${escHtml(f.name)}</div>
        <div class="folder-count">${count} note${count !== 1 ? 's' : ''}</div>
      </div>
      <span class="folder-chevron">›</span>
    `;
    div.addEventListener('click', () => openFolder(f.id));
    // Long press to edit
    let longPress;
    div.addEventListener('touchstart', () => { longPress = setTimeout(() => openEditFolder(f.id), 600); }, { passive: true });
    div.addEventListener('touchend', () => clearTimeout(longPress), { passive: true });
    div.addEventListener('touchmove', () => clearTimeout(longPress), { passive: true });
    list.appendChild(div);
  });
}

function openFolder(id) {
  currentFolderId = id;
  const f = db.folders.find(x => x.id === id);
  document.getElementById('notes-topbar-title').textContent = f.emoji + '  ' + f.name;
  renderNotes();
  showScreen('screen-notes', 'forward');
}

// ════════════════════════════════════════════
//  FOLDER MODAL
// ════════════════════════════════════════════
function buildEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJIS.forEach(e => {
    const btn = document.createElement('div');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = e;
    });
    grid.appendChild(btn);
  });
}

function openNewFolder() {
  editingFolderId = null;
  selectedEmoji = '📁';
  document.getElementById('modal-folder-title').textContent = 'Nouveau dossier';
  document.getElementById('modal-folder-save').textContent = 'Créer';
  document.getElementById('modal-folder-name').value = '';
  buildEmojiGrid();
  document.getElementById('modal-folder').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-folder-name').focus(), 50);
}

function openEditFolder(id) {
  editingFolderId = id;
  const f = db.folders.find(x => x.id === id);
  selectedEmoji = f.emoji;
  document.getElementById('modal-folder-title').textContent = 'Modifier le dossier';
  document.getElementById('modal-folder-save').textContent = 'Enregistrer';
  document.getElementById('modal-folder-name').value = f.name;
  buildEmojiGrid();
  document.getElementById('modal-folder').classList.remove('hidden');
}

document.getElementById('btn-new-folder').addEventListener('click', openNewFolder);
document.getElementById('modal-folder-cancel').addEventListener('click', () => document.getElementById('modal-folder').classList.add('hidden'));
document.getElementById('modal-folder-save').addEventListener('click', () => {
  const name = document.getElementById('modal-folder-name').value.trim();
  if (!name) return;
  if (editingFolderId) {
    const f = db.folders.find(x => x.id === editingFolderId);
    f.name = name; f.emoji = selectedEmoji;
  } else {
    db.folders.push({ id: uid(), name, emoji: selectedEmoji, createdAt: Date.now() });
  }
  saveData(db);
  document.getElementById('modal-folder').classList.add('hidden');
  renderFolders();
  if (editingFolderId && currentFolderId === editingFolderId) {
    const f = db.folders.find(x => x.id === editingFolderId);
    document.getElementById('notes-topbar-title').textContent = f.emoji + '  ' + f.name;
  }
});
document.getElementById('btn-edit-folder').addEventListener('click', () => openEditFolder(currentFolderId));

// ════════════════════════════════════════════
//  NOTES LIST
// ════════════════════════════════════════════
function renderNotes(folderId) {
  const id = folderId || currentFolderId;
  const notes = db.notes.filter(n => n.folderId === id).sort((a, b) => b.updatedAt - a.updatedAt);
  const list = document.getElementById('note-list');
  list.innerHTML = '';
  if (!notes.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div><p>Aucune note.<br>Appuie sur + pour commencer.</p></div>`;
    return;
  }
  notes.forEach(note => {
    const div = document.createElement('div');
    div.className = 'note-item';
    div.dataset.id = note.id;
    const preview = getTextPreview(note.body);
    div.innerHTML = `
      <div class="note-color-dot" style="background:${note.color || 'var(--ink3)'}"></div>
      <div class="note-info">
        <div class="note-item-title">${escHtml(note.title || 'Sans titre')}</div>
        <div class="note-item-preview">${escHtml(preview)}</div>
        <div class="note-item-date">${fmtDate(note.updatedAt)}</div>
      </div>
    `;
    div.addEventListener('click', () => openNote(note.id));
    list.appendChild(div);
  });
}

function getTextPreview(bodyHtml) {
  const tmp = document.createElement('div');
  tmp.innerHTML = bodyHtml || '';
  return (tmp.textContent || '').slice(0, 80);
}

// ════════════════════════════════════════════
//  EDITOR
// ════════════════════════════════════════════
function openNote(id) {
  currentNoteId = id;
  const note = db.notes.find(n => n.id === id);
  const folder = db.folders.find(f => f.id === note.folderId);
  document.getElementById('editor-topbar-folder').textContent = folder ? folder.emoji : '';
  document.getElementById('editor-title').textContent = note.title || '';
  document.getElementById('editor-body').innerHTML = note.body || '';
  updateCheckListeners();
  showScreen('screen-editor', 'forward');
}

function newNote() {
  const id = uid();
  db.notes.push({ id, folderId: currentFolderId, title: '', body: '', color: '#52b788', createdAt: Date.now(), updatedAt: Date.now() });
  saveData(db);
  openNote(id);
}

function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const note = db.notes.find(n => n.id === currentNoteId);
    if (!note) return;
    note.title = document.getElementById('editor-title').textContent.trim();
    note.body = document.getElementById('editor-body').innerHTML;
    note.updatedAt = Date.now();
    saveData(db);
  }, 600);
}

document.getElementById('editor-title').addEventListener('input', autoSave);
document.getElementById('editor-body').addEventListener('input', autoSave);

// ── ENTER KEY HANDLING ──
document.getElementById('editor-title').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('editor-body').focus();
  }
});

document.getElementById('editor-body').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const node = sel.anchorNode;

  // Are we inside a check-line ?
  const checkLine = node && node.nodeType === 3
    ? node.parentElement.closest('.check-line')
    : node && node.closest ? node.closest('.check-line') : null;

  if (checkLine) {
    e.preventDefault();
    const checkText = checkLine.querySelector('.check-text');
    const textContent = checkText ? checkText.textContent.trim() : '';
    // If the current item is empty, pressing Enter exits the checklist
    if (!textContent) {
      // Remove the empty check-line and insert a normal paragraph
      checkLine.remove();
      document.execCommand('insertParagraph');
      autoSave();
      return;
    }
    // Otherwise insert a new check-line after current
    const newId = uid();
    const newLine = document.createElement('div');
    newLine.className = 'check-line';
    newLine.dataset.cid = newId;
    newLine.innerHTML = `<input type="checkbox" data-cid="${newId}"><span class="check-text" contenteditable="true">\u200b</span>`;
    checkLine.after(newLine);
    // Move cursor to new span
    const span = newLine.querySelector('.check-text');
    const r = document.createRange();
    r.selectNodeContents(span);
    r.collapse(false);
    sel.removeAllRanges();
    sel.addRange(r);
    updateCheckListeners();
    autoSave();
  } else {
    // Normal text: let browser handle but force <br>/<div> not <li>
    e.preventDefault();
    document.execCommand('insertParagraph');
    autoSave();
  }
});

// ════════════════════════════════════════════
//  TOOLBAR ACTIONS
// ════════════════════════════════════════════
document.getElementById('tbtn-check').addEventListener('click', insertCheckItem);
document.getElementById('tbtn-yl').addEventListener('click', () => applyHighlight('hl-y'));
document.getElementById('tbtn-pk').addEventListener('click', () => applyHighlight('hl-p'));
document.getElementById('tbtn-bl').addEventListener('click', () => applyHighlight('hl-b'));
document.getElementById('tbtn-gn').addEventListener('click', () => applyHighlight('hl-g'));
document.getElementById('tbtn-or').addEventListener('click', () => applyHighlight('hl-o'));
document.getElementById('tbtn-bold').addEventListener('click', () => document.execCommand('bold'));
document.getElementById('tbtn-italic').addEventListener('click', () => document.execCommand('italic'));

function insertCheckItem() {
  const body = document.getElementById('editor-body');
  body.focus();
  const id = uid();
  const html = `<div class="check-line" data-cid="${id}"><input type="checkbox" data-cid="${id}"><span class="check-text" contenteditable="true">&nbsp;</span></div>`;
  document.execCommand('insertHTML', false, html);
  updateCheckListeners();
  autoSave();
  // Place cursor
  const span = body.querySelector(`[data-cid="${id}"] .check-text`);
  if (span) { const r = document.createRange(); r.selectNodeContents(span); r.collapse(false); const s = window.getSelection(); s.removeAllRanges(); s.addRange(r); }
}

function applyHighlight(cls) {
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const span = document.createElement('span');
  span.className = cls;
  try { range.surroundContents(span); } catch { document.execCommand('insertHTML', false, `<span class="${cls}">${sel.toString()}</span>`); }
  autoSave();
}

function updateCheckListeners() {
  document.querySelectorAll('#editor-body .check-line input[type=checkbox]').forEach(cb => {
    cb.onchange = function() {
      const line = this.closest('.check-line');
      if (this.checked) line.classList.add('done'); else line.classList.remove('done');
      autoSave();
    };
  });
}

// ════════════════════════════════════════════
//  EXPORT NOTE
// ════════════════════════════════════════════
function exportNoteAsText() {
  const note = db.notes.find(n => n.id === currentNoteId);
  if (!note) return;
  const title = document.getElementById('editor-title').textContent.trim() || 'Sans titre';
  const bodyEl = document.getElementById('editor-body');

  let lines = [];
  lines.push(title);
  lines.push('='.repeat(Math.min(title.length, 60)));
  const folder = db.folders.find(f => f.id === note.folderId);
  if (folder) lines.push('Dossier : ' + folder.emoji + ' ' + folder.name);
  lines.push('Date : ' + new Date(note.updatedAt).toLocaleString('fr'));
  lines.push('');

  // Walk child nodes of editor-body
  bodyEl.childNodes.forEach(node => {
    if (node.nodeType === 3) {
      // text node
      const t = node.textContent;
      if (t.trim()) lines.push(t);
    } else if (node.nodeType === 1) {
      const el = node;
      if (el.classList.contains('check-line')) {
        const cb = el.querySelector('input[type=checkbox]');
        const txt = el.querySelector('.check-text');
        const checked = cb && cb.checked;
        const text = txt ? txt.textContent.replace(/\u200b/g, '').trim() : '';
        lines.push((checked ? '[x] ' : '[ ] ') + text);
      } else {
        // paragraph, div, span, etc. – extract text
        const text = el.textContent.replace(/\u200b/g, '').trim();
        if (text) lines.push(text);
        else lines.push(''); // blank line
      }
    }
  });

  const content = lines.join('\n');
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = title.replace(/[^a-zA-Z0-9\u00C0-\u024F\s_-]/g, '').trim().replace(/\s+/g, '_') || 'note';
  a.href = url;
  a.download = safeName + '.txt';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}
document.getElementById('btn-export-note').addEventListener('click', exportNoteAsText);


function buildNcPicker() {
  const picker = document.getElementById('nc-picker');
  picker.innerHTML = '';
  const note = db.notes.find(n => n.id === currentNoteId);
  NOTE_COLORS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'nc-opt' + (note && note.color === c ? ' selected' : '');
    div.style.background = c === '#ffffff00' ? 'var(--bg3)' : c;
    div.style.border = c === '#ffffff00' ? '1px solid var(--border2)' : '3px solid transparent';
    div.addEventListener('click', () => {
      document.querySelectorAll('.nc-opt').forEach(x => x.classList.remove('selected'));
      div.classList.add('selected');
      const n = db.notes.find(x => x.id === currentNoteId);
      if (n) { n.color = c; n.updatedAt = Date.now(); saveData(db); }
    });
    picker.appendChild(div);
  });
}
document.getElementById('btn-note-color').addEventListener('click', () => { buildNcPicker(); document.getElementById('modal-note-color').classList.remove('hidden'); });
document.getElementById('modal-nc-cancel').addEventListener('click', () => document.getElementById('modal-note-color').classList.add('hidden'));

// ════════════════════════════════════════════
//  MOVE NOTE
// ════════════════════════════════════════════
document.getElementById('btn-move-note').addEventListener('click', () => {
  const list = document.getElementById('move-folder-list');
  list.innerHTML = '';
  const note = db.notes.find(n => n.id === currentNoteId);
  db.folders.forEach(f => {
    if (f.id === currentFolderId) return;
    const div = document.createElement('div');
    div.className = 'move-folder-opt';
    div.innerHTML = `<span>${f.emoji}</span><span>${escHtml(f.name)}</span>`;
    div.addEventListener('click', () => {
      if (note) { note.folderId = f.id; note.updatedAt = Date.now(); saveData(db); }
      document.getElementById('modal-move').classList.add('hidden');
      goBackToNotes();
    });
    list.appendChild(div);
  });
  if (!list.children.length) list.innerHTML = '<p style="font-size:14px;color:var(--ink3);">Aucun autre dossier disponible.</p>';
  document.getElementById('modal-move').classList.remove('hidden');
});
document.getElementById('modal-move-cancel').addEventListener('click', () => document.getElementById('modal-move').classList.add('hidden'));

// ════════════════════════════════════════════
//  DELETE NOTE
// ════════════════════════════════════════════
document.getElementById('btn-delete-note').addEventListener('click', () => document.getElementById('modal-confirm-delete').classList.remove('hidden'));
document.getElementById('modal-del-cancel').addEventListener('click', () => document.getElementById('modal-confirm-delete').classList.add('hidden'));
document.getElementById('modal-del-confirm').addEventListener('click', () => {
  db.notes = db.notes.filter(n => n.id !== currentNoteId);
  saveData(db);
  document.getElementById('modal-confirm-delete').classList.add('hidden');
  goBackToNotes();
});

// ════════════════════════════════════════════
//  NAVIGATION BUTTONS
// ════════════════════════════════════════════
document.getElementById('btn-back-folders').addEventListener('click', () => { renderFolders(); showScreen('screen-folders', 'back'); });
document.getElementById('btn-back-notes').addEventListener('click', goBackToNotes);
document.getElementById('btn-new-note').addEventListener('click', newNote);

function goBackToNotes() {
  clearTimeout(saveTimer);
  const note = db.notes.find(n => n.id === currentNoteId);
  if (note) {
    note.title = document.getElementById('editor-title').textContent.trim();
    note.body = document.getElementById('editor-body').innerHTML;
    note.updatedAt = Date.now();
    if (!note.title && !getTextPreview(note.body)) {
      db.notes = db.notes.filter(n => n.id !== currentNoteId);
    }
    saveData(db);
  }
  renderNotes();
  showScreen('screen-notes', 'back');
}

// ════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════
document.getElementById('btn-search-toggle').addEventListener('click', () => {
  const wrap = document.getElementById('search-bar-wrap');
  const visible = wrap.style.display !== 'none';
  wrap.style.display = visible ? 'none' : 'block';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('folders-main').style.display = visible ? 'block' : 'block';
  if (!visible) setTimeout(() => document.getElementById('search-input').focus(), 50);
});

document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const results = document.getElementById('search-results');
  const list = document.getElementById('search-list');
  if (!q) { results.style.display = 'none'; return; }
  results.style.display = 'block';
  const matches = db.notes.filter(n => (n.title || '').toLowerCase().includes(q) || getTextPreview(n.body).toLowerCase().includes(q));
  list.innerHTML = '';
  if (!matches.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ink3);font-size:14px;">Aucun résultat</div>'; return; }
  matches.sort((a, b) => b.updatedAt - a.updatedAt).forEach(note => {
    const folder = db.folders.find(f => f.id === note.folderId);
    const div = document.createElement('div');
    div.className = 'note-item';
    const preview = getTextPreview(note.body);
    div.innerHTML = `
      <div class="note-color-dot" style="background:${note.color || 'var(--ink3)'}"></div>
      <div class="note-info">
        <div class="note-item-title">${escHtml(note.title || 'Sans titre')}</div>
        <div class="note-item-preview">${folder ? folder.emoji + ' ' + escHtml(folder.name) + '  —  ' : ''}${escHtml(preview)}</div>
        <div class="note-item-date">${fmtDate(note.updatedAt)}</div>
      </div>
    `;
    div.addEventListener('click', () => {
      currentFolderId = note.folderId;
      openNote(note.id);
    });
    list.appendChild(div);
  });
});

// ════════════════════════════════════════════
//  CLOSE MODALS ON OVERLAY CLICK
// ════════════════════════════════════════════
['modal-folder','modal-note-color','modal-move','modal-confirm-delete'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });
});

// ════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderFolders();

// SERVICE WORKER (inline) for offline support
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'memos-v1';
    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))); });
  `;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
